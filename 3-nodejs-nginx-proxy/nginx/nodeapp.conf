upstream nodejs_backend {
    # Node.js app listens on port 3000
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name nodeapp.local www.nodeapp.local;

    # Access and error logs
    access_log /var/log/nginx/nodeapp.local_access.log;
    error_log  /var/log/nginx/nodeapp.local_error.log;

    # Serve static files directly from Nginx (faster than proxying to Node)
    location ~* \.(html|css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf)$ {
        root /var/www/nodeapp/public;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy all other requests to the Node.js backend
    location / {
        proxy_pass http://nodejs_backend;

        # Pass real client information to Node.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
