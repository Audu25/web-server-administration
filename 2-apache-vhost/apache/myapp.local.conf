<VirtualHost *:80>
    # The domain name for this virtual host
    ServerName myapp.local
    ServerAlias www.myapp.local

    # Document root - where Apache serves files from
    DocumentRoot /var/www/myapp.local/html

    # Directory permissions
    <Directory /var/www/myapp.local/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Separate log files per virtual host
    ErrorLog  ${APACHE_LOG_DIR}/myapp.local_error.log
    CustomLog ${APACHE_LOG_DIR}/myapp.local_access.log combined
</VirtualHost>
